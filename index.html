// STRIPE_LINK: înlocuiește cu link-ul tău de plată Stripe
const STRIPE_PAYMENT_LINK = "https://buy.stripe.com/YOUR_LINK_HERE";
const TRIAL_DAYS = 14;

function getPremiumState() {
  const s = loadData('premium_state', null);
  if (!s) return { status: 'none' }; // nu a început trial
  if (s.status === 'active') return s; // plătit
  if (s.status === 'trial') {
    const daysLeft = Math.ceil((s.trialEnd - Date.now()) / 86400000);
    if (daysLeft > 0) return { ...s, daysLeft };
    return { status: 'expired', trialEnd: s.trialEnd };
  }
  return s;
}
function startTrial() {
  const state = { status: 'trial', trialStart: Date.now(), trialEnd: Date.now() + TRIAL_DAYS * 86400000 };
  saveData('premium_state', state);
  return state;
}
function activatePremium() {
  const state = { status: 'active', activatedAt: Date.now() };
  saveData('premium_state', state);
  return state;
}
function isPremiumActive(ps) {
  if (!ps) return false;
  if (ps.status === 'active') return true;
  if (ps.status === 'trial' && ps.daysLeft > 0) return true;
  return false;
}

function getMedInfo(name){
  if(!name) return null;
  const key=name.toLowerCase().trim();
  let med=MED_DB[key];
  if(med?.alias) med=MED_DB[med.alias];
  if(med&&!med.alias) return med;
  for(const[k,v] of Object.entries(MED_DB)){
    if(v.alias) continue;
    if(key.includes(k)||k.includes(key)||v.name?.toLowerCase().includes(key)) return v;
  }
  return null;
}

function calcDosage(medInfo, ageMonths, weightKg){
  if(!medInfo) return null;
  if(ageMonths<medInfo.minAgeMonths) return{error:"age",warning:medInfo.warning};
  if(weightKg&&weightKg<medInfo.minKg) return{error:"weight",warning:medInfo.warning};
  let doseInfo=null;
  if(medInfo.dozeByKg&&weightKg){
    for(const d of medInfo.dozeByKg){if(weightKg>=d.minKg&&weightKg<=d.maxKg){doseInfo=d;break;}}
  }
  if(!doseInfo&&medInfo.dozeByVarsta){
    for(const d of medInfo.dozeByVarsta){if(ageMonths>=d.minMonths&&ageMonths<d.maxMonths){doseInfo=d;break;}}
  }
  if(!doseInfo&&medInfo.dosePerKg&&weightKg&&medInfo.concentratieMgPerML){
    const doseMg=medInfo.dosePerKg*weightKg;
    const doseML=Math.round(doseMg/medInfo.concentratieMgPerML*10)/10;
    doseInfo={doseML,doseMg:Math.round(doseMg),label:`${doseML} ml (${Math.round(doseMg)} mg)`,calculated:true};
  }
  return{doseInfo,intervalHours:medInfo.intervalHours,maxTimesPerDay:medInfo.maxTimesPerDay,warning:medInfo.warning,isAntibiotic:medInfo.isAntibiotic,color:medInfo.color};
}

  {id:"weight",icon:"⚖️",color:"#D4A574",dark:"#B07D4F",hasFields:true,interval:10080},
  {id:"height",icon:"📏",color:"#B5CDA3",dark:"#8AAF72",hasFields:true,interval:10080},
];

function getFields(typeId,t){
  const f=t.fields;
  const sel=(opts)=>opts.map(o=>({value:o[0],label:o[1]}));
  switch(typeId){
    case"feed":return[{key:"type",label:f.feedType,type:"select",options:sel([["breastL",f.breastL],["breastR",f.breastR],["bottle",f.bottle],["solid",f.solid]])},{key:"ml",label:f.ml,type:"number",showIf:f=>f.type!=="solid"},{key:"solidFood",label:f.solidFood,type:"text",placeholder:f.solidFoodPlaceholder,showIf:f=>f.type==="solid"}];
    case"medicine":return[{key:"name",label:f.medName,type:"text"},{key:"dose",label:f.dose,type:"text"}];
    case"fever":return[{key:"temp",label:f.temp,type:"number"}];
    case"diaper":return[{key:"type",label:f.diaperType,type:"select",options:sel([["wet",f.wet],["dirty",f.dirty],["both",f.both],["clean",f.clean]])}];
    case"sleep":return[{key:"duration",label:f.duration,type:"number"}];
    case"weight":return[{key:"kg",label:f.kg,type:"number"}];
    case"height":return[{key:"cm",label:f.cm,type:"number"}];
    default:return[];
  }
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fmtDate(ts,lang){return new Date(ts).toLocaleDateString(lang==="ro"?"ro-RO":"en-US",{weekday:"short",day:"numeric",month:"short"});}
function fmtDateFull(ts,lang){return new Date(ts).toLocaleDateString(lang==="ro"?"ro-RO":"en-US",{day:"numeric",month:"long",year:"numeric"});}
function getNowTimeStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}

function calcAgeMonths(bd){if(!bd)return null;return Math.floor((Date.now()-new Date(bd).getTime())/(30.44*24*3600*1000));}
function calcAgeDays(bd){if(!bd)return null;return Math.floor((Date.now()-new Date(bd).getTime())/86400000);}

function calcAge(bd,t){
  if(!bd)return null;
  const days=Math.floor((Date.now()-new Date(bd).getTime())/86400000);
  if(days<0)return null;if(days<7)return days+" "+t.time.days;
  const w=Math.floor(days/7);if(w<12)return w+" "+t.time.weeks;
  const mo=Math.floor(days/30.44);if(mo<24)return mo+" "+t.time.months;
  const y=Math.floor(mo/12);return y+" "+t.time.years+" "+t.time.and+" "+(mo%12)+" "+t.time.months;
}

function tStatus(m,iv,t){
  const r=m/iv;if(r<0.6)return{color:"#85CDCA",label:t.status.ok};
  if(r<0.85)return{color:"#E8A87C",label:t.status.soon};return{color:"#E27D60",label:t.status.now};
}

  size=size||28;const r=(size-4)/2,c=2*Math.PI*r,p=Math.min(elapsed/total,1);

    h('circle',{cx:size/2,cy:size/2,r,fill:"none",stroke:"#F0E8DD",strokeWidth:3}),

function fmtAgo(ts,t){
  const d=Date.now()-ts,m=Math.floor(d/60000),hr=Math.floor(m/60),dy=Math.floor(hr/24);
  if(m<1)return t.time.now;if(m<60)return t.time.ago+" "+m+" "+t.time.min;
  if(hr<24)return t.time.ago+" "+hr+t.time.h+" "+(m%60)+t.time.min;
  return t.time.ago+" "+dy+" "+t.time.days;
}

function MedAlerts({entries,t,setup}){
  const alerts=useMemo(()=>{
    const meds=entries.filter(e=>e.typeId==="medicine"&&e.details?.name);
    const lat={};
    meds.forEach(e=>{const k=e.details.name.toLowerCase().trim();if(!lat[k]||e.timestamp>lat[k].timestamp)lat[k]=e;});
    return Object.entries(lat).map(([key,entry])=>{
      const medInfo=getMedInfo(key);
      const hrs=medInfo?medInfo.intervalHours:6;
      const nd=entry.timestamp+hrs*3600000;
      const can=Date.now()>=nd;
      const left=nd-Date.now();
      const today=new Date();today.setHours(0,0,0,0);
      const todayCount=entries.filter(e=>e.typeId==="medicine"&&e.details?.name&&getMedInfo(e.details.name)===medInfo&&e.timestamp>=today.getTime()).length;
      const maxTimesPerDay=medInfo?medInfo.maxTimesPerDay:4;
      const maxReached=todayCount>=maxTimesPerDay;
      return{entry,can,hL:Math.floor(left/3600000),mL:Math.floor((left%3600000)/60000),left,maxReached,todayCount,maxTimesPerDay,medInfo};
    }).filter(a=>a.left>-86400000);
  },[entries]);
  if(!alerts.length)return null;
  const lang=setup?.lang||"ro";
  return h('div',{style:{marginBottom:16}},alerts.map((a,i)=>{
    const ageMonths=calcAgeMonths(setup?.birthDate);
    const weightKg=parseFloat(setup?.birthWeight)||null;

      h('div',{style:{display:"flex",alignItems:"flex-start",gap:10}},

          h('div',{style:{fontSize:13,fontWeight:700,color:"#3D3024",marginBottom:2}},a.entry.details.name),
          h('div',{style:{fontSize:12,color:a.maxReached?"#E27D60":a.can?"#5BA8A5":"#C45B3E",fontWeight:700,marginBottom:2}},
            a.maxReached?t.medicine.maxReached:a.can?t.medicine.canTake:t.medicine.nextIn+" "+(a.hL>0?a.hL+"h ":"")+a.mL+"min"),
          h('div',{style:{display:"flex",gap:8,alignItems:"center"}},

  }));
}

function GrowthChart({entries,setup,t}){
  const canvasRef=useRef(null);
  const lang=setup?.lang||"ro";
  const gender=setup?.gender||"boy";

  const weightEntries=useMemo(()=>{
    const initial=setup?.birthWeight&&setup?.birthDate?[{timestamp:new Date(setup.birthDate).getTime(),details:{kg:setup.birthWeight}}]:[];
    return [...initial,...entries.filter(e=>e.typeId==="weight"&&e.details?.kg)].sort((a,b)=>a.timestamp-b.timestamp);
  },[entries,setup]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas||weightEntries.length===0)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width=canvas.offsetWidth||340;
    const H=canvas.height=220;
    ctx.clearRect(0,0,W,H);

    const pad={top:20,right:20,bottom:40,left:40};
    const cw=W-pad.left-pad.right;
    const ch=H-pad.top-pad.bottom;

    const omsData=gender==="girl"?OMS_WEIGHT_GIRLS:OMS_WEIGHT_BOYS;
    const maxM=Math.max(24,Math.max(...weightEntries.map(e=>calcAgeMonths(setup.birthDate)||0))+2);
    const maxKg=Math.max(16,...weightEntries.map(e=>parseFloat(e.details.kg)||0),omsData[omsData.length-1].p97)+1;

    const xScale=(m)=>pad.left+(m/maxM)*cw;
    const yScale=(kg)=>pad.top+ch-(kg/maxKg)*ch;

    // Grid
    ctx.strokeStyle="#F0E8DD";ctx.lineWidth=1;
    for(let kg=2;kg<=maxKg;kg+=2){
      ctx.beginPath();ctx.moveTo(pad.left,yScale(kg));ctx.lineTo(W-pad.right,yScale(kg));ctx.stroke();
      ctx.fillStyle="#C4AD97";ctx.font="9px Quicksand,sans-serif";ctx.textAlign="right";
      ctx.fillText(kg+"kg",pad.left-4,yScale(kg)+3);
    }
    for(let m=0;m<=maxM;m+=3){
      ctx.beginPath();ctx.moveTo(xScale(m),pad.top);ctx.lineTo(xScale(m),H-pad.bottom);ctx.stroke();
      ctx.fillStyle="#C4AD97";ctx.font="9px Quicksand,sans-serif";ctx.textAlign="center";
      ctx.fillText(m+"l",xScale(m),H-pad.bottom+12);
    }

    // OMS curves
    const omsCurves=[
      {key:"p3",color:"#95B8D188",width:1,dash:[4,3],label:"P3"},
      {key:"p15",color:"#85CDCA88",width:1,dash:[4,3],label:"P15"},
      {key:"p50",color:"#E8A87C",width:2,dash:[],label:"P50"},
      {key:"p85",color:"#85CDCA88",width:1,dash:[4,3],label:"P85"},
      {key:"p97",color:"#95B8D188",width:1,dash:[4,3],label:"P97"},
    ];
    omsCurves.forEach(curve=>{
      ctx.beginPath();ctx.strokeStyle=curve.color;ctx.lineWidth=curve.width;ctx.setLineDash(curve.dash);
      omsData.forEach((pt,i)=>{
        const x=xScale(pt.m),y=yScale(pt[curve.key]);
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.stroke();ctx.setLineDash([]);
      // Label at end
      const last=omsData[omsData.length-1];
      ctx.fillStyle=curve.color;ctx.font="bold 9px Quicksand,sans-serif";ctx.textAlign="left";
      ctx.fillText(curve.label,xScale(last.m)+4,yScale(last[curve.key])+3);
    });

    // Baby's data
    if(weightEntries.length>1){
      ctx.beginPath();ctx.strokeStyle="#CB997E";ctx.lineWidth=2.5;
      weightEntries.forEach((e,i)=>{
        const m=calcAgeMonths(setup.birthDate)||0;
        const ageAtEntry=Math.floor((e.timestamp-new Date(setup.birthDate).getTime())/(30.44*24*3600*1000));
        const x=xScale(ageAtEntry),y=yScale(parseFloat(e.details.kg));
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.stroke();
    }
    // Dots
    weightEntries.forEach(e=>{
      const ageAtEntry=Math.floor((e.timestamp-new Date(setup.birthDate).getTime())/(30.44*24*3600*1000));
      const x=xScale(ageAtEntry),y=yScale(parseFloat(e.details.kg));
      ctx.beginPath();ctx.arc(x,y,5,0,2*Math.PI);ctx.fillStyle="#CB997E";ctx.fill();
      ctx.beginPath();ctx.arc(x,y,3,0,2*Math.PI);ctx.fillStyle="#FFF";ctx.fill();
    });
  },[weightEntries,setup,t]);

  return h('div',{style:{marginBottom:20}},
    h('h3',{style:{fontSize:15,fontWeight:700,color:"#5D4037",marginBottom:8}},"⚖️ "+t.growth.weight),
    weightEntries.length<1
      ?h('div',{style:{textAlign:"center",padding:24,color:"#C4AD97",fontSize:13,background:"rgba(255,255,255,0.5)",borderRadius:12}},t.growth.noData)
      :h(Fragment,null,
          h('div',{style:{background:"rgba(255,255,255,0.8)",borderRadius:14,padding:"8px",border:"1px solid #F0E8DD",overflow:"hidden"}},
            h('canvas',{ref:canvasRef,style:{width:"100%",display:"block"}})),
          h('div',{style:{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}},
            h('div',{style:{display:"flex",alignItems:"center",gap:4}},
              h('div',{style:{width:16,height:3,background:"#CB997E",borderRadius:1}}),
              h('span',{style:{fontSize:10,color:"#5D4037",fontWeight:700}},(lang==="ro"?"Bebelușul tău":"Your baby"))),
            h('div',{style:{display:"flex",alignItems:"center",gap:4}},
              h('div',{style:{width:16,height:3,background:"#E8A87C",borderRadius:1}}),
              h('span',{style:{fontSize:10,color:"#8B7355"}},"P50 — "+(lang==="ro"?"greutatea medie OMS":"WHO median weight"))),
            h('div',{style:{display:"flex",alignItems:"center",gap:4}},
              h('div',{style:{width:16,height:2,borderTop:"2px dashed #85CDCA",borderRadius:1}}),
              h('span',{style:{fontSize:10,color:"#8B7355"}},"P3/P15/P85/P97"))),
          h('div',{style:{marginTop:10,padding:"10px 12px",background:"#F5F0EA",borderRadius:10,fontSize:11,color:"#7A6355",lineHeight:1.6}},
            lang==="ro"
              ?"💡 Percentilele OMS arată cum se compară greutatea față de copii de aceeași vârstă și sex. P50 = median (jumătate din copii sunt mai grei, jumătate mai ușori). P3–P97 = intervalul normal. Dacă bebelușul e între P3 și P97, e totul bine!"
              :"💡 WHO percentiles show how weight compares to children of the same age and sex. P50 = median. P3–P97 = normal range. If your baby is between P3 and P97, everything is fine!")));

// ─── PREMIUM TAB ───
function PremiumTab({premiumState,t,lang,entries,setup,onStartTrial,onSubscribe,onActivateDemo}){
  const isActive=isPremiumActive(premiumState);
  const isExpired=premiumState?.status==="expired";

  function exportCSV(){
    if(!entries.length)return;
    const headers=["Data","Ora","Tip","Detalii"];
    const rows=entries.map(e=>{
      const type=TYPES.find(x=>x.id===e.typeId);
      const det=Object.entries(e.details||{}).map(([k,v])=>k+":"+v).join("; ");
      return[fmtDate(e.timestamp,lang),fmtTime(e.timestamp),type?type.id:e.typeId,det];
    });
    const csv=[headers,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="lilloo_export_"+new Date().toISOString().slice(0,10)+".csv";a.click();
    URL.revokeObjectURL(url);
  }

  function generatePDF(){
    const {jsPDF}=window.jspdf||{};
    if(!jsPDF){alert(lang==="ro"?"Biblioteca PDF se încarcă... reîncearcă":"PDF library loading... retry");return;}
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,margin=20;
    let y=margin;

    // Header
    doc.setFillColor(203,153,126);doc.rect(0,0,W,40,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(22);doc.setFont("helvetica","bold");
    doc.text("Lilloo — Raport Medical",margin,18);
    doc.setFontSize(11);doc.setFont("helvetica","normal");
    doc.text(lang==="ro"?"Raport generat automat pentru consultație pediatrică":"Auto-generated report for pediatric consultation",margin,26);
    doc.text((lang==="ro"?"Data raportului: ":"Report date: ")+new Date().toLocaleDateString("ro-RO"),margin,34);
    y=50;

    // Baby info
    if(setup){
      doc.setTextColor(93,64,55);doc.setFontSize(14);doc.setFont("helvetica","bold");
      doc.text(lang==="ro"?"Informații pacient":"Patient information",margin,y);y+=7;
      doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(80,60,50);
      const ageStr=calcAge(setup.birthDate,T[lang])||"—";
      const wt=entries.find(e=>e.typeId==="weight"&&e.details?.kg);
      const ht=entries.find(e=>e.typeId==="height"&&e.details?.cm);
      [[lang==="ro"?"Nume":"Name",setup.name],[lang==="ro"?"Dată naștere":"Birth date",setup.birthDate||"—"],[lang==="ro"?"Vârstă":"Age",ageStr],[lang==="ro"?"Greutate actuală":"Current weight",(wt?.details?.kg||setup.birthWeight||"—")+"kg"],[lang==="ro"?"Înălțime actuală":"Current height",(ht?.details?.cm||"—")+"cm"]].forEach(([label,val])=>{
        doc.setFont("helvetica","bold");doc.text(label+":",margin,y);
        doc.setFont("helvetica","normal");doc.text(String(val),margin+50,y);y+=6;
      });
      y+=5;
    }

    // Separator
    doc.setDrawColor(203,153,126);doc.setLineWidth(0.5);doc.line(margin,y,W-margin,y);y+=8;

    // Last 7 days entries
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(93,64,55);
    doc.text(lang==="ro"?"Înregistrări ultimele 7 zile":"Last 7 days entries",margin,y);y+=7;

    const sevenDaysAgo=Date.now()-7*86400000;
    const recent=entries.filter(e=>e.timestamp>=sevenDaysAgo).sort((a,b)=>b.timestamp-a.timestamp);

    if(!recent.length){
      doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(160,148,132);
      doc.text(lang==="ro"?"Nicio înregistrare în ultimele 7 zile":"No entries in last 7 days",margin,y);y+=8;
    } else {
      const typeGroups={};
      recent.forEach(e=>{if(!typeGroups[e.typeId])typeGroups[e.typeId]=[];typeGroups[e.typeId].push(e);});
      Object.entries(typeGroups).forEach(([typeId,es])=>{
        const type=TYPES.find(x=>x.id===typeId);
        doc.setFontSize(11);doc.setFont("helvetica","bold");doc.setTextColor(93,64,55);
        doc.text((type?.icon||"•")+" "+((T[lang]||T.ro).track[typeId]||typeId)+" ("+es.length+"×)",margin,y);y+=5;
        es.slice(0,5).forEach(e=>{
          if(y>270){doc.addPage();y=margin;}
          const det=Object.entries(e.details||{}).map(([k,v])=>v).filter(Boolean).join(", ");
          doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(120,100,85);
          doc.text("  "+fmtDate(e.timestamp,lang)+" "+fmtTime(e.timestamp)+(det?" — "+det:""),margin,y);y+=5;
        });
        if(es.length>5){doc.setFontSize(8);doc.text("  ... și "+(es.length-5)+" mai multe",margin,y);y+=5;}
        y+=2;
      });
    }

    // Med summary
    const medEntries=entries.filter(e=>e.typeId==="medicine"&&e.timestamp>=sevenDaysAgo);
    if(medEntries.length){
      if(y>260){doc.addPage();y=margin;}
      doc.setDrawColor(203,153,126);doc.line(margin,y,W-margin,y);y+=8;
      doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(93,64,55);
      doc.text(lang==="ro"?"Medicamente administrate (7 zile)":"Medications given (7 days)",margin,y);y+=7;
      const medMap={};
      medEntries.forEach(e=>{const k=e.details?.name||"?";if(!medMap[k])medMap[k]=0;medMap[k]++;});
      Object.entries(medMap).forEach(([name,count])=>{
        doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(80,60,50);
        doc.text("• "+name+" — "+count+" "+(lang==="ro"?"doze":"doses"),margin,y);y+=6;
      });
    }

    // Footer
    doc.setFontSize(8);doc.setTextColor(160,148,132);
    doc.text("Generat de Lilloo Baby Tracker · lilloo.app · Verificați întotdeauna cu medicul pediatru",margin,285);

    doc.save("lilloo_raport_pediatru_"+new Date().toISOString().slice(0,10)+".pdf");
  }

  return h('div',null,
    // Status card
    h('div',{style:{padding:"20px",marginBottom:18,borderRadius:18,background:isActive?"linear-gradient(135deg,#E8F8F0,#D0F0E4)":"linear-gradient(135deg,#FFF9EE,#FFF3DC)",border:"1.5px solid "+(isActive?"#85CDCA55":"#F0DFC0")}},
      h('div',{style:{textAlign:"center",marginBottom:16}},
        h('div',{style:{fontSize:40,marginBottom:8}},(isActive?"⭐":"🔒")),
        h('h2',{style:{fontSize:20,fontFamily:"'Cormorant Garamond',Georgia,serif",color:"#5D4037",marginBottom:4}},
          isActive?(premiumState.status==="trial"?t.premium.trialActive:t.premium.title):t.premium.trialTitle),
        h('p',{style:{fontSize:13,color:"#8B7355",lineHeight:1.5}},
          isActive&&premiumState.status==="trial"?"⏳ "+premiumState.daysLeft+" "+t.premium.daysLeft:
          isActive?"✅ "+(lang==="ro"?"Abonament activ":"Active subscription"):
          isExpired?t.premium.expiredMsg:t.premium.trialSubtitle)),
      !isActive&&!isExpired&&h('button',{onClick:onStartTrial,style:{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#CB997E,#A47148)",color:"#FFF",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Quicksand',sans-serif",boxShadow:"0 6px 20px rgba(164,113,72,0.25)",marginBottom:8,animation:"gentlePulse 2s ease infinite"}},t.premium.startTrial),
      (isExpired||(!isActive&&false))&&h('button',{onClick:onSubscribe,style:{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#CB997E,#A47148)",color:"#FFF",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Quicksand',sans-serif",marginBottom:8}},t.premium.subscribe),
      isActive&&h('button',{onClick:onSubscribe,style:{width:"100%",padding:"10px",borderRadius:12,border:"2px solid #CB997E",background:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:"#CB997E",fontFamily:"'Quicksand',sans-serif"}},t.premium.manageSubscription)),

    // Features list cu acțiuni funcționale
    isActive&&h('div',{style:{marginBottom:18}},
      // PDF
      h('div',{style:{padding:"14px",background:"rgba(255,255,255,0.8)",borderRadius:14,border:"1px solid #F0E8DD",marginBottom:8}},
        h('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},

                  field.options.map(opt=>h('button',{key:opt.value,onClick:()=>setForm(f=>({...f,[field.key]:opt.value})),style:{padding:"8px 14px",borderRadius:12,fontSize:13,fontWeight:700,fontFamily:"'Quicksand',sans-serif",cursor:"pointer",transition:"all 0.15s",background:form[field.key]===opt.value?trackType.color+"30":"rgba(255,255,255,0.7)",border:"2px solid "+(form[field.key]===opt.value?trackType.color:"#E8DDD0"),color:form[field.key]===opt.value?trackType.dark:"#7A6E5D"}},opt.label))):
                h('input',{type:field.type,value:form[field.key]||"",step:field.type==="number"?"0.1":undefined,onChange:e=>setForm(f=>({...f,[field.key]:e.target.value})),placeholder:field.placeholder||field.label,style:{...inp,background:"rgba(255,255,255,0.7)"},onFocus:e=>e.target.style.borderColor=trackType.color,onBlur:e=>e.target.style.borderColor="#E8DDD0"}));
          }),
          trackType.id==="medicine"&&h(DosageCard,{medName:form.name||"",ageMonths,weightKg,t,lang,todayMedEntries}),
          h('div',{style:{display:"flex",gap:10,marginTop:18}},
            h('button',{onClick:()=>setShowModal(false),style:{flex:1,padding:"11px",borderRadius:14,fontSize:14,fontWeight:700,cursor:"pointer",background:"#FAF5ED",border:"2px solid #E8DDD0",color:"#7A6E5D",fontFamily:"'Quicksand',sans-serif"}},t.track.cancel),
            h('button',{onClick:saveEntry,style:{flex:1,padding:"11px",borderRadius:14,fontSize:14,fontWeight:800,cursor:"pointer",background:"linear-gradient(135deg,"+trackType.color+","+trackType.dark+")",border:"none",color:"#FFF",fontFamily:"'Quicksand',sans-serif",boxShadow:"0 4px 14px "+trackType.color+"44"}},t.track.save)));
      })()),

    // ── Child Switcher Modal ──
    h(Modal,{open:showChildModal,onClose:()=>setShowChildModal(false),title:lang==="ro"?"Profiluri bebeluși":"Baby profiles"},
      profiles&&h(ChildSwitcher,{profiles,activeId:activeProfileId,
        onSwitch:(id)=>{setActiveProfileId(id);setShowChildModal(false);},
        onAdd:addProfile,
        onClose:()=>setShowChildModal(false),
        t})));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Lilloo));
</script>
